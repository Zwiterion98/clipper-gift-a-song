<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te presto un tema</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(10,10,10,.65), rgba(10,10,10,.92)),
        url("https://clipper.com.uy/");
      background-size: cover;
      background-position: center;
      color: white;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .container {
      width: min(440px, 92vw);
      text-align: center;
      padding: 22px;
    }

    .artist-hero {
      margin-bottom: 22px;
    }

    .artist-logo {
      width: 150px;
      height: 150px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background:
        linear-gradient(rgba(0,0,0,.2), rgba(0,0,0,.2)),
        url("https://clipper.com.uy/");
      background-size: cover;
      background-position: center;
      border: 2px solid rgba(255,255,255,.25);
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #1DB954;
      font-weight: 800;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
    }

    .subtitle {
      color: #d0d0d0;
      margin: 10px 0 26px;
      line-height: 1.35;
    }

    .slot {
      height: 330px;
      overflow: hidden;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.16);
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      backdrop-filter: blur(18px);
    }

    .slot::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(5,5,5,.9), transparent 24%, transparent 76%, rgba(5,5,5,.9)),
        linear-gradient(to right, rgba(255,255,255,.05), transparent 18%, transparent 82%, rgba(255,255,255,.05));
    }

    .slot::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 50%;
      height: 110px;
      transform: translateY(-50%);
      z-index: 4;
      pointer-events: none;
      border-top: 2px solid rgba(29,185,84,.65);
      border-bottom: 2px solid rgba(29,185,84,.65);
      box-shadow: 0 0 32px rgba(29,185,84,.16);
      border-radius: 18px;
    }

    .track-list {
      transform: translateY(0);
      transition: transform 4.8s cubic-bezier(.08,.82,.18,1);
    }

    .song {
      height: 110px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      text-align: left;
      opacity: .72;
    }

    .song img {
      width: 66px;
      height: 66px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      background: #222;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    .info {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-weight: 900;
      font-size: 17px;
      line-height: 1.2;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist {
      color: #c7c7c7;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      margin-top: 22px;
      color: #d8d8d8;
      font-size: 15px;
      min-height: 22px;
    }

    button {
      margin-top: 20px;
      padding: 15px 26px;
      border: none;
      border-radius: 999px;
      background: #1DB954;
      color: white;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 12px 34px rgba(29,185,84,.28);
    }

    button:disabled {
      opacity: .55;
      cursor: default;
    }

    .winner-card {
      display: none;
      margin-top: 22px;
      padding: 16px;
      border-radius: 24px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      text-align: left;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(18px);
    }

    .winner-card.show {
      display: flex;
    }

    .winner-card img {
      width: 76px;
      height: 76px;
      border-radius: 16px;
      object-fit: cover;
    }

    .winner-label {
      font-size: 12px;
      color: #1DB954;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="artist-hero">
      <div class="artist-logo"></div>
      <div class="eyebrow">Clipper presenta</div>
      <h1>Te presto un tema</h1>
      <p class="subtitle">Escaneaste el NFC. La ruleta elige una canción para vos.</p>
    </section>

    <section class="slot">
      <div class="track-list" id="trackList"></div>
    </section>

    <div class="status" id="status">Cargando canciones...</div>

    <button id="spinButton" disabled>Tocar ruleta</button>

    <div class="winner-card" id="winnerCard">
      <img id="winnerImage" src="" alt="">
      <div>
        <div class="winner-label">Te tocó</div>
        <div class="title" id="winnerTitle"></div>
        <div class="artist" id="winnerArtist"></div>
      </div>
    </div>
  </main>

  <script>
    const songUrls = [
      "https://open.spotify.com/track/61TolqB1VKg9MY2LLvQWt5?si=78cd06a047fa4b93",
      "https://open.spotify.com/track/7HbsvzSYNJH0YpG3znMesG?si=70dce0c7f4a54531",
      "https://open.spotify.com/track/37dgB9iFTztNq2jcexYFDs?si=e22ceef252cf4774",
      "https://open.spotify.com/track/6EOfT7JypEbWperfogUNXm?si=ab07c733fffb4f1d",
        "https://open.spotify.com/track/2UZzTvm4JndQhOkFASv4SI?si=55a29b037efb4a28",    
        "https://open.spotify.com/track/1o1pgZY1V0ZRDC44uKkoF6?si=293f4e442ca74d41",  
        "https://open.spotify.com/track/0QFJQs8KibGpf0F7XLAjpi?si=5e3208c875144f36",  
        "https://open.spotify.com/track/7tTFsAjBYrhJ8fVWKuNEOi?si=ae63089757364e88",  
        "https://open.spotify.com/track/0ZuA1RkFBPqtkIQ0LqxsOW?si=557dbbc97e4a4687",  
        "https://open.spotify.com/track/4mnI5RHeLuT64H7FKE3Blx?si=505353b3afdd4190",  
        "https://open.spotify.com/track/0L9ZFTCXNSjJ09o5Z35ZyE?si=f8cec4e45255431b",  
        "https://open.spotify.com/track/0ZMiR70FrvQDBx0hrn9pVH?si=adebc23fd31f4345",  
        
    ];
  

    const autoStart = false; // Para NFC: cambiar a true

    const itemHeight = 110;
    const visibleItems = 3;
    const loops = 12;

    let songs = [];

    const trackList = document.getElementById("trackList");
    const spinButton = document.getElementById("spinButton");
    const statusText = document.getElementById("status");

    const winnerCard = document.getElementById("winnerCard");
    const winnerImage = document.getElementById("winnerImage");
    const winnerTitle = document.getElementById("winnerTitle");
    const winnerArtist = document.getElementById("winnerArtist");

    async function getSpotifyData(spotifyUrl) {
      const endpoint = `https://open.spotify.com/oembed?url=${encodeURIComponent(spotifyUrl)}`;
      const res = await fetch(endpoint);

      if (!res.ok) {
        throw new Error("No se pudo cargar metadata de Spotify");
      }

      const data = await res.json();
      const parsed = parseSpotifyTitle(data.title);

      return {
        title: parsed.title,
        artist: parsed.artist,
        image: data.thumbnail_url,
        url: spotifyUrl
      };
    }

    function parseSpotifyTitle(rawTitle) {
      let clean = rawTitle || "Canción de Spotify";

      clean = clean
        .replace(" - song and lyrics by ", "|||")
        .replace(" - canción y letra de ", "|||")
        .replace(" - song by ", "|||")
        .replace(" - canción de ", "|||");

      const parts = clean.split("|||");

      return {
        title: parts[0]?.trim() || rawTitle,
        artist: parts[1]?.trim() || "Spotify"
      };
    }

    async function loadSongs() {
      return await Promise.all(
        songUrls.map(url => getSpotifyData(url))
      );
    }

    function createSongElement(song) {
      const div = document.createElement("div");
      div.className = "song";

      div.innerHTML = `
        <img src="${song.image}" alt="${song.title}">
        <div class="info">
          <div class="title">${song.title}</div>
          <div class="artist">${song.artist}</div>
        </div>
      `;

      return div;
    }

    function buildSlot() {
      trackList.innerHTML = "";

      for (let i = 0; i < loops; i++) {
        songs.forEach(song => {
          trackList.appendChild(createSongElement(song));
        });
      }

      trackList.style.transition = "none";
      trackList.style.transform = "translateY(0)";

      statusText.textContent = "Listo para elegir tu tema.";
      spinButton.disabled = false;
    }

    function spin() {
      spinButton.disabled = true;
      winnerCard.classList.remove("show");
      statusText.textContent = "Buscando el tema que te tocó...";

      const winnerIndex = Math.floor(Math.random() * songs.length);
      const finalLoop = loops - 2;
      const finalIndex = finalLoop * songs.length + winnerIndex;
      const centerOffset = Math.floor(visibleItems / 2) * itemHeight;
      const finalPosition = (finalIndex * itemHeight) - centerOffset;

      trackList.style.transition = "none";
      trackList.style.transform = "translateY(0)";

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          trackList.style.transition = "transform 5s cubic-bezier(.08,.82,.18,1)";
          trackList.style.transform = `translateY(-${finalPosition}px)`;
        });
      });

      setTimeout(() => {
        const winner = songs[winnerIndex];

        statusText.textContent = "Esta canción es para vos.";

        winnerImage.src = winner.image;
        winnerTitle.textContent = winner.title;
        winnerArtist.textContent = winner.artist;
        winnerCard.classList.add("show");

        setTimeout(() => {
          window.location.href = winner.url;
        }, 2200);
      }, 5200);
    }

    async function init() {
      try {
        songs = await loadSongs();
        buildSlot();

        if (autoStart) {
          setTimeout(spin, 900);
        }
      } catch (error) {
        console.error(error);
        statusText.textContent = "No se pudieron cargar las canciones.";
      }
    }

    spinButton.addEventListener("click", spin);

    init();
  </script>
</body>
</html>
