<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te presto un tema</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(29,185,84,.22), transparent 34%),
        linear-gradient(180deg, #121212 0%, #000 100%);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .container {
      width: min(440px, 92vw);
      padding: 22px;
      text-align: center;
    }

    .artist-card {
      background: linear-gradient(180deg, #242424, #181818);
      border-radius: 28px;
      padding: 24px 20px;
      margin-bottom: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
    }

    .artist-image {
      width: 138px;
      height: 138px;
      margin: 0 auto 18px;
      border-radius: 50%;
      object-fit: cover;
      background: #333;
      box-shadow: 0 18px 45px rgba(0,0,0,.55);
    }

    .spotify-label {
      color: #1DB954;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 900;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 10px auto 0;
      color: #b3b3b3;
      font-size: 15px;
      line-height: 1.4;
      max-width: 310px;
    }

    .spotify-pill {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1DB954;
      font-size: 13px;
      font-weight: 800;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #1DB954;
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(29,185,84,.8);
    }

    .slot {
      height: 330px;
      overflow: hidden;
      border-radius: 24px;
      background: #181818;
      border: 1px solid rgba(255,255,255,.08);
      position: relative;
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
    }

    .slot::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        #181818 0%,
        transparent 24%,
        transparent 76%,
        #181818 100%
      );
    }

    .slot::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 50%;
      height: 110px;
      transform: translateY(-50%);
      z-index: 4;
      pointer-events: none;
      border-radius: 18px;
      border: 2px solid rgba(29,185,84,.85);
      box-shadow: 0 0 34px rgba(29,185,84,.25);
    }

    .track-list {
      transform: translateY(0);
      transition: transform 5s cubic-bezier(.08,.82,.18,1);
    }

    .song {
      height: 110px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      text-align: left;
      background: #181818;
    }

    .song img {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: #282828;
      flex-shrink: 0;
    }

    .song-number {
      color: #b3b3b3;
      font-size: 13px;
      width: 18px;
      flex-shrink: 0;
    }

    .info {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist {
      color: #b3b3b3;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      margin-top: 20px;
      color: #b3b3b3;
      font-size: 15px;
      min-height: 22px;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 999px;
      background: #1DB954;
      color: #000;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }

    button:hover {
      background: #1ed760;
      transform: scale(1.02);
    }

    button:disabled {
      opacity: .45;
      cursor: default;
      transform: none;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      display: grid;
      place-items: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      padding: 24px;
    }

    .popup-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .popup {
      width: min(390px, 92vw);
      background: linear-gradient(180deg, #282828, #181818);
      border-radius: 28px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 30px 90px rgba(0,0,0,.75);
      transform: translateY(18px) scale(.96);
      transition: transform .25s ease;
      border: 1px solid rgba(255,255,255,.08);
    }

    .popup-overlay.show .popup {
      transform: translateY(0) scale(1);
    }

    .popup-label {
      color: #1DB954;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .popup-cover {
      width: 220px;
      height: 220px;
      max-width: 72vw;
      max-height: 72vw;
      border-radius: 18px;
      object-fit: cover;
      background: #333;
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      margin-bottom: 20px;
    }

    .popup-title {
      font-size: 24px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.6px;
      margin-bottom: 8px;
    }

    .popup-artist {
      color: #b3b3b3;
      font-size: 15px;
      margin-bottom: 22px;
    }

    .popup-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .spotify-button {
      display: block;
      width: 100%;
      padding: 15px 20px;
      border-radius: 999px;
      background: #1DB954;
      color: #000;
      text-decoration: none;
      font-weight: 900;
      font-size: 15px;
    }

    .secondary-button {
      background: transparent;
      color: #b3b3b3;
      border: 1px solid rgba(255,255,255,.16);
      margin-top: 0;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="artist-card">
      <img class="artist-image" src="./clipper.png" alt="Clipper">

      <div class="spotify-label">NFC Music Drop</div>
      <h1>Te regalo un tema</h1>
      <p class="subtitle">
        Escaneaste el NFC. La ruleta elige una canción de Clipper para vos.
      </p>

      <div class="spotify-pill">
        <span class="dot"></span>
        Powered by Spotify
      </div>
    </section>

    <section class="slot">
      <div class="track-list" id="trackList"></div>
    </section>

    <div class="status" id="status">Cargando canciones...</div>

    <button id="spinButton" disabled>Tocar ruleta</button>
  </main>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <div class="popup-label">Esta canción es para vos</div>
      <img class="popup-cover" id="popupImage" src="" alt="">
      <div class="popup-title" id="popupTitle"></div>
      <div class="popup-artist" id="popupArtist"></div>

      <div class="popup-actions">
        <a class="spotify-button" id="spotifyButton" href="#" target="_self">
          Abrir en Spotify
        </a>

        <button class="secondary-button" id="closePopupButton">
          Volver a girar
        </button>
      </div>
    </div>
  </div>

  <script>
     const songUrls = [
  "https://open.spotify.com/track/7Mejmj7iPL8AYSLyh74T3z",
  "https://open.spotify.com/track/0U8rdM2HKV0DBLjlTDodvY",
  "https://open.spotify.com/track/1PoKzwgMyejDjblOIa51rK",
  "https://open.spotify.com/track/5Gl9ixIjSWZHIlVUTB2tug",
  "https://open.spotify.com/track/3ky00XWugW2okX8JAPoJqS",
  "https://open.spotify.com/track/2BAOAtWQw28Df31CdQc3bL",
  "https://open.spotify.com/track/6iVAyqPJq79DiAo6tyz3SD",
  "https://open.spotify.com/track/0QFJQs8KibGpf0F7XLAjpi",
  "https://open.spotify.com/track/15WCHwzhhGSoGX23Osx3VY",
  "https://open.spotify.com/track/6f1zvPpPhUsJm96N3OuKLl",
  "https://open.spotify.com/track/61TolqB1VKg9MY2LLvQWt5",
  "https://open.spotify.com/track/1lFm3FyAQQvEy7NOLrWFnd",
  "https://open.spotify.com/track/4Siu63PBuo7cdKNoVm4LNa",
  "https://open.spotify.com/track/3AdwuTfhjFq1l62GWJfN9s",
  "https://open.spotify.com/track/0Iwv3jG5rxp8B2AQM0n5QT",
  "https://open.spotify.com/track/6EOfT7JypEbWperfogUNXm",
  "https://open.spotify.com/track/4bK1CDdyVs0jYQ3kbfrIiA",
  "https://open.spotify.com/track/7m3fQfXMv4HJNoCMRGwr6Z",
  "https://open.spotify.com/track/37dgB9iFTztNq2jcexYFDs",
  "https://open.spotify.com/track/2UZzTvm4JndQhOkFASv4SI",
  "https://open.spotify.com/track/1o1pgZY1V0ZRDC44uKkoF6",
  "https://open.spotify.com/track/0ZuA1RkFBPqtkIQ0LqxsOW",
  "https://open.spotify.com/track/7tTFsAjBYrhJ8fVWKuNEOi",
  "https://open.spotify.com/track/1L3f10jX030hfPkjpg0Sp5",
  "https://open.spotify.com/track/0ZMiR70FrvQDBx0hrn9pVH",
  "https://open.spotify.com/track/4mnI5RHeLuT64H7FKE3Blx",
  "https://open.spotify.com/track/0L9ZFTCXNSjJ09o5Z35ZyE",
  "https://open.spotify.com/track/7gBwf7josq8to4KqbD3ZTZ",
  "https://open.spotify.com/track/2yIKndy6A79c14rdb1rodx",
  "https://open.spotify.com/track/2t7jRpC4wbrpd6fyXFSAod",
  "https://open.spotify.com/track/5FU4Ovg29LJbipYt0p5Q5f",
  "https://open.spotify.com/track/0ZMiR70FrvQDBx0hrn9pVH",
  "https://open.spotify.com/track/7HbsvzSYNJH0YpG3znMesG",
  "https://open.spotify.com/track/2VF22nBOD8wXsnsdUDX4A6",
  "https://open.spotify.com/track/2ZYAW1ejS9Wkx8Cz2Bm5Zz"
];

    const autoStart = true; // Para NFC: poner true
    const autoRedirect = true; // Si querés que vaya solo a Spotify, poner true

    const itemHeight = 110;
    const visibleItems = 3;
    const loops = 12;

    let songs = [];

    const trackList = document.getElementById("trackList");
    const spinButton = document.getElementById("spinButton");
    const statusText = document.getElementById("status");

    const popupOverlay = document.getElementById("popupOverlay");
    const popupImage = document.getElementById("popupImage");
    const popupTitle = document.getElementById("popupTitle");
    const popupArtist = document.getElementById("popupArtist");
    const spotifyButton = document.getElementById("spotifyButton");
    const closePopupButton = document.getElementById("closePopupButton");

    async function getSpotifyData(spotifyUrl) {
      const endpoint = `https://open.spotify.com/oembed?url=${encodeURIComponent(spotifyUrl)}`;
      const res = await fetch(endpoint);

      if (!res.ok) throw new Error("No se pudo cargar metadata de Spotify");

      const data = await res.json();
      const parsed = parseSpotifyTitle(data.title);

      return {
        title: parsed.title,
        artist: parsed.artist,
        image: data.thumbnail_url,
        url: spotifyUrl
      };
    }

    function parseSpotifyTitle(rawTitle) {
      let clean = rawTitle || "Canción de Spotify";

      clean = clean
        .replace(" - song and lyrics by ", "|||")
        .replace(" - canción y letra de ", "|||")
        .replace(" - song by ", "|||")
        .replace(" - canción de ", "|||");

      const parts = clean.split("|||");

      return {
        title: parts[0]?.trim() || rawTitle,
        artist: parts[1]?.trim() || "Spotify"
      };
    }

    async function loadSongs() {
      return await Promise.all(songUrls.map(url => getSpotifyData(url)));
    }

    function createSongElement(song, index) {
      const div = document.createElement("div");
      div.className = "song";

      div.innerHTML = `
        <div class="song-number">${index + 1}</div>
        <img src="${song.image}" alt="${song.title}">
        <div class="info">
          <div class="title">${song.title}</div>
          <div class="artist">${song.artist}</div>
        </div>
      `;

      return div;
    }

    function buildSlot() {
      trackList.innerHTML = "";

      for (let i = 0; i < loops; i++) {
        songs.forEach((song, index) => {
          trackList.appendChild(createSongElement(song, index));
        });
      }

      trackList.style.transition = "none";
      trackList.style.transform = "translateY(0)";

      statusText.textContent = "Listo para elegir tu tema.";
      spinButton.disabled = false;
    }

    function spin() {
      spinButton.disabled = true;
      popupOverlay.classList.remove("show");
      statusText.textContent = "Buscando el tema que te tocó...";

      const winnerIndex = Math.floor(Math.random() * songs.length);
      const finalLoop = loops - 2;
      const finalIndex = finalLoop * songs.length + winnerIndex;
      const centerOffset = Math.floor(visibleItems / 2) * itemHeight;
      const finalPosition = (finalIndex * itemHeight) - centerOffset;

      trackList.style.transition = "none";
      trackList.style.transform = "translateY(0)";

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          trackList.style.transition = "transform 5s cubic-bezier(.08,.82,.18,1)";
          trackList.style.transform = `translateY(-${finalPosition}px)`;
        });
      });

      setTimeout(() => {
        const winner = songs[winnerIndex];
        showWinnerPopup(winner);
      }, 5200);
    }

    function showWinnerPopup(song) {
      statusText.textContent = "Esta canción es para vos.";

      popupImage.src = song.image;
      popupTitle.textContent = song.title;
      popupArtist.textContent = song.artist;
      spotifyButton.href = song.url;

      popupOverlay.classList.add("show");

      if (autoRedirect) {
        setTimeout(() => {
          window.location.href = song.url;
        }, 2500);
      }
    }

    function closePopup() {
      popupOverlay.classList.remove("show");
      spinButton.disabled = false;
      statusText.textContent = "Podés volver a girar.";
    }

    async function init() {
      try {
        songs = await loadSongs();
        buildSlot();

        if (autoStart) {
          setTimeout(spin, 900);
        }
      } catch (error) {
        console.error(error);
        statusText.textContent = "No se pudieron cargar las canciones.";
      }
    }

    spinButton.addEventListener("click", spin);
    closePopupButton.addEventListener("click", closePopup);

    init();
  </script>
</body>
</html>
